<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2342"/>
      <stop offset="55%" stop-color="#0a0e20"/>
      <stop offset="100%" stop-color="#050913"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8da6ff"/>
      <stop offset="100%" stop-color="#5760f2"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="20" y="20" width="1400" height="860" rx="20" fill="#0b1022" stroke="#1d2851"/>

  <rect x="20" y="20" width="1400" height="44" rx="20" fill="#080b18"/>
  <circle cx="42" cy="42" r="6" fill="#ff605c"/>
  <circle cx="62" cy="42" r="6" fill="#ffbd44"/>
  <circle cx="82" cy="42" r="6" fill="#00ca4e"/>
  <text x="720" y="47" font-family="Segoe UI, Arial" font-size="14" fill="#6e7bb4" text-anchor="middle" letter-spacing="2">CATHUP SSH V2.0</text>

  <rect x="36" y="80" width="300" height="780" rx="16" fill="#10162b" stroke="#1d2851"/>
  <rect x="52" y="96" width="40" height="40" rx="10" fill="url(#brand)"/>
  <text x="72" y="122" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
  <text x="106" y="122" font-family="Segoe UI, Arial" font-size="32" font-weight="700" fill="#ffffff">Cathup</text>
  <text x="52" y="160" font-family="Segoe UI, Arial" font-size="12" fill="#7e8abc" letter-spacing="1">HOST GROUPS</text>

  <rect x="52" y="180" width="268" height="110" rx="12" fill="#0d1427" stroke="#334176"/>
  <text x="64" y="205" font-family="Segoe UI, Arial" font-size="14" fill="#d8ddff">prod-web-01</text>
  <text x="64" y="225" font-family="Segoe UI, Arial" font-size="12" fill="#7e8abc">root@10.0.0.10:22</text>
  <rect x="64" y="240" width="46" height="20" rx="10" fill="#1a2447"/>
  <text x="87" y="254" font-family="Segoe UI, Arial" font-size="11" fill="#abc0ff" text-anchor="middle">prod</text>

  <rect x="52" y="304" width="268" height="110" rx="12" fill="#0d1427" stroke="#334176"/>
  <text x="64" y="329" font-family="Segoe UI, Arial" font-size="14" fill="#d8ddff">dev-api-02</text>
  <text x="64" y="349" font-family="Segoe UI, Arial" font-size="12" fill="#7e8abc">ubuntu@10.0.1.24:22</text>
  <rect x="64" y="364" width="40" height="20" rx="10" fill="#1a2447"/>
  <text x="84" y="378" font-family="Segoe UI, Arial" font-size="11" fill="#abc0ff" text-anchor="middle">dev</text>

  <rect x="52" y="808" width="268" height="40" rx="10" fill="#131d3a" stroke="#334176"/>
  <text x="186" y="833" font-family="Segoe UI, Arial" font-size="16" fill="#cdd7ff" text-anchor="middle">+ Add New Host</text>

  <rect x="350" y="80" width="660" height="780" rx="16" fill="#10162b" stroke="#1d2851"/>
  <text x="370" y="116" font-family="Segoe UI, Arial" font-size="18" fill="#d8ddff">Terminal</text>

  <rect x="370" y="134" width="620" height="560" rx="12" fill="#080b18" stroke="#1a2144"/>
  <text x="386" y="164" font-family="Consolas, monospace" font-size="13" fill="#89a0ff">$ ssh prod-web-01</text>
  <text x="386" y="186" font-family="Consolas, monospace" font-size="13" fill="#d8ddff">Last login: Sat Mar 07 20:12:31 2026 from 10.0.0.1</text>
  <text x="386" y="208" font-family="Consolas, monospace" font-size="13" fill="#89a0ff">$ tail -f /var/log/nginx/error.log</text>
  <text x="386" y="230" font-family="Consolas, monospace" font-size="13" fill="#ffcb6b">[AUDIT] medium risk command confirmed</text>

  <rect x="370" y="710" width="620" height="44" rx="10" fill="#101833" stroke="#303d70"/>
  <text x="386" y="738" font-family="Consolas, monospace" font-size="13" fill="#7e8abc">Type command or drag AI answer here...</text>

  <rect x="1024" y="80" width="380" height="780" rx="16" fill="#10162b" stroke="#1d2851"/>
  <text x="1044" y="116" font-family="Segoe UI, Arial" font-size="18" fill="#d8ddff">AI Terminal Assistant</text>

  <rect x="1044" y="138" width="340" height="122" rx="12" fill="#0d1427" stroke="#334176"/>
  <text x="1060" y="164" font-family="Segoe UI, Arial" font-size="13" fill="#d8ddff">Need a safe log cleanup command?</text>
  <text x="1060" y="186" font-family="Segoe UI, Arial" font-size="13" fill="#d8ddff">Use:</text>
  <text x="1060" y="208" font-family="Consolas, monospace" font-size="12" fill="#89a0ff">find /var/log -type f -name '*.log' -size +100M</text>
  <text x="1060" y="228" font-family="Consolas, monospace" font-size="12" fill="#89a0ff">-exec truncate -s 0 {} \;</text>

  <rect x="1044" y="768" width="280" height="76" rx="10" fill="#101833" stroke="#303d70"/>
  <text x="1060" y="808" font-family="Segoe UI, Arial" font-size="13" fill="#7e8abc">Ask Linux or SSH questions...</text>
  <rect x="1338" y="768" width="46" height="76" rx="10" fill="#1a2447" stroke="#334176"/>
  <text x="1361" y="811" font-family="Segoe UI, Arial" font-size="14" fill="#cdd7ff" text-anchor="middle">Send</text>
</svg>
